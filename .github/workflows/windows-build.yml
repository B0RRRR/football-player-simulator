name: Build for Windows

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Download SFML 2.6.1
      run: |
        Invoke-WebRequest -Uri "https://github.com/SFML/SFML/releases/download/2.6.1/SFML-2.6.1-windows-vc17-64-bit.zip" -OutFile "sfml.zip"
        Expand-Archive -Path sfml.zip -DestinationPath .

    - name: Configure CMake
      run: cmake -B build -S . -DSFML_DIR="$PWD/SFML-2.6.1/lib/cmake/SFML"

    - name: Build
      run: cmake --build build --config Release

    - name: Package Game
      run: |
        mkdir release
        Copy-Item -Path build\Release\*.exe -Destination release\
        Copy-Item -Path SFML-2.6.1\bin\*.dll -Destination release\ -ErrorAction SilentlyContinue
        if (Test-Path assets) { Copy-Item -Path assets -Destination release\assets -Recurse }

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FootballSimulator-Windows
        path: release/
